<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Calculator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f4f4f4;\n        }\n        #calculator {\n            background: white;\n            padding: 20px;\n            border-radius: 10px;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);\n        }\n        #display {\n            width: 100%;\n            height: 40px;\n            text-align: right;\n            margin-bottom: 10px;\n            font-size: 24px;\n            border: 1px solid #ccc;\n            border-radius: 5px;\n            padding: 5px;\n        }\n        button {\n            width: 60px;\n            height: 60px;\n            margin: 5px;\n            font-size: 24px;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n            transition: background-color 0.3s;\n        }\n        button:hover {\n            background-color: #e7e7e7;\n        }\n        #operation {\n            background-color: #fe9241;\n            color: white;\n        }\n    </style>\n</head>\n<body>\n    <div id="calculator">\n        <input type="text" id="display" disabled />\n        <div>\n            <button onclick="clearDisplay()">C</button>\n            <button onclick="appendToDisplay('7')">7</button>\n            <button onclick="appendToDisplay('8')">8</button>\n            <button onclick="appendToDisplay('9')">9</button>\n            <button id="operation" onclick="appendToDisplay('/')">&divide;</button>\n        </div>\n        <div>\n            <button onclick="appendToDisplay('4')">4</button>\n            <button onclick="appendToDisplay('5')">5</button>\n            <button onclick="appendToDisplay('6')">6</button>\n            <button id="operation" onclick="appendToDisplay('*')">&times;</button>\n        </div>\n        <div>\n            <button onclick="appendToDisplay('1')">1</button>\n            <button onclick="appendToDisplay('2')">2</button>\n            <button onclick="appendToDisplay('3')">3</button>\n            <button id="operation" onclick="appendToDisplay('-')">-</button>\n        </div>\n        <div>\n            <button onclick="appendToDisplay('0')">0</button>\n            <button id="operation" onclick="calculateResult()">=</button>\n            <button id="operation" onclick="appendToDisplay('+')">+</button>\n        </div>\n    </div>\n    <script>\n        function appendToDisplay(value) {\n            document.getElementById('display').value += value;\n        }\n        function clearDisplay() {\n            document.getElementById('display').value = '';\n        }\n        function calculateResult() {\n            const display = document.getElementById('display');\n            try {\n                display.value = eval(display.value);\n            } catch (e) {\n                display.value = 'Error';\n            }\n        }\n    </script>\n</body>\n</html>
